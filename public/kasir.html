<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kasir Ayana Cosmetics</title>

<style>
body{font-family:Arial,sans-serif;background:#ffe4ef;margin:0;padding:20px}
.card{max-width:450px;margin:auto;background:white;padding:25px;border-radius:25px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
h1{text-align:center;color:#d81b60}
input{width:100%;padding:14px;border-radius:12px;border:2px solid #f8bbd0;box-sizing:border-box;font-size:16px}
button{width:100%;margin-top:12px;padding:14px;border:none;border-radius:999px;background:#d81b60;color:white;font-weight:bold;cursor:pointer}
.result{margin-top:20px;padding:15px;border-radius:15px;background:#fff4f8;line-height:1.8}
.ok{color:green;font-weight:bold}
.bad{color:red;font-weight:bold}
.usebtn{background:#0f9d58}
</style>
</head>

<body>

<div class="card">
<h1>Kasir Ayana</h1>
<div id="dashboardKasir" class="result">
  Memuat dashboard kasir...
</div>

<input id="kode" placeholder="Scan / masukkan kode voucher" autofocus onkeydown="handleScan(event)">

<button onclick="cekVoucher()">CEK VOUCHER</button>

<div id="hasil"></div>
</div>

<script>
function handleScan(event){
  if(event.key === "Enter"){
    event.preventDefault();
    cekVoucher();
  }
}

let kodeTerakhir = "";

async function cekVoucher(){
  const kode = document.getElementById("kode").value.trim().toUpperCase();
  if(!kode) return;

  kodeTerakhir = kode;
  const hasil = document.getElementById("hasil");
  hasil.innerHTML = "Memeriksa voucher...";

  try{
    const r = await fetch(`/api/verify?kode=${encodeURIComponent(kode)}`);
    const d = await r.json();

    if(!d.ok){
      hasil.innerHTML = `<div class="result"><span class="bad">❌ ${d.message}</span></div>`;
      return;
    }

    const status = String(d.voucher.status || "").toUpperCase();
    const warnaStatus = status === "DIKLAIM" ? "ok" : "bad";

    let tombolGunakan = "";

    if(status === "DIKLAIM"){
      tombolGunakan = `<button class="usebtn" onclick="gunakanVoucher()">GUNAKAN VOUCHER</button>`;
    }

    hasil.innerHTML =
    `<div class="result">
      ✅ Voucher ditemukan<br>
      <b>Kode:</b> ${d.voucher.kodeVoucher}<br>
      <b>Member:</b> ${d.voucher.namaMember}<br>
      <b>WA:</b> ${d.voucher.nomorWA}<br>
      <b>Promo:</b> ${d.promo.namaPromo}<br>
      <b>Diskon:</b> Rp${Number(d.promo.diskon).toLocaleString("id-ID")}<br>
      <b>Status:</b> <span class="${warnaStatus}">${status}</span>
      ${tombolGunakan}
    </div>`;

  }catch(err){
    hasil.innerHTML = `<div class="result"><span class="bad">❌ Error server</span></div>`;
  }
}

async function gunakanVoucher(){
  if(!kodeTerakhir) return;

  if(!confirm("Gunakan voucher ini sekarang?")) return;

  const hasil = document.getElementById("hasil");
  hasil.innerHTML += "<br>Memproses penggunaan voucher...";

  try{
    const r = await fetch("/api/use-voucher", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ kode: kodeTerakhir })
    });

    const d = await r.json();

    if(d.ok){
      hasil.innerHTML =
      `<div class="result">
        <span class="ok">✅ ${d.message}</span><br>
        <b>Kode:</b> ${d.kodeVoucher}<br>
        <b>Member:</b> ${d.namaMember}<br>
        <b>WA:</b> ${d.nomorWA}<br>
        <b>Waktu Pakai:</b> ${d.waktuPakai}
      </div>`;
    }else{
      hasil.innerHTML =
      `<div class="result">
        <span class="bad">❌ ${d.message}</span>
      </div>`;
    }

  }catch(err){
    hasil.innerHTML =
    `<div class="result">
      <span class="bad">❌ Error server</span>
    </div>`;
  }
}
async function loadDashboardKasir(){
  const box = document.getElementById("dashboardKasir");
  if(!box) return;

  try{
    const r = await fetch("/api/dashboard-kasir");
    const d = await r.json();

    if(!d.ok){
      box.innerHTML = "Dashboard gagal dimuat.";
      return;
    }

    if(!d.aktif){
      box.innerHTML = d.message || "Belum ada promo aktif.";
      return;
    }

    const terakhir = d.klaimTerakhir
      ? `<br><b>Klaim terakhir:</b> ${d.klaimTerakhir.namaMember || "-"} (${d.klaimTerakhir.status})`
      : `<br><b>Klaim terakhir:</b> Belum ada`;

    box.innerHTML = `
      <b>${d.promo.namaPromo}</b><br>
      🎁 Sisa voucher: <b>${d.tersedia} / ${d.total}</b><br>
      👥 Diklaim: <b>${d.diklaim}</b> | ✅ Terpakai: <b>${d.terpakai}</b>
      ${terakhir}
    `;

  }catch(e){
    box.innerHTML = "Dashboard gagal dimuat.";
  }
}

loadDashboardKasir();
setInterval(loadDashboardKasir, 15000);
</script>

</body>
</html>
