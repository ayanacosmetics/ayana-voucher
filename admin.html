<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Voucher Ayana</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:block;">
  <main class="admin">
    <h1>Admin Voucher Ayana</h1>
    <p>PIN bawaan: <b>123456</b>. Halaman ini harus dibuka dari server, contoh: <b>http://localhost:3000/admin</b>, bukan dari file HTML langsung.</p>
    <div id="warning" style="display:none;background:#fff3cd;border:1px solid #ffd966;padding:12px;border-radius:12px;margin:12px 0;color:#5f4100"></div>
    <div class="admin-grid">
      <label class="full">PIN Admin<input id="pin" type="password" placeholder="Masukkan PIN admin" value="123456"></label>
      <label>Nama Promo<input id="promo_name" type="text"></label>
      <label>Jumlah Voucher<input id="voucher_limit" type="number" min="1"></label>
      <label>Nominal Diskon<input id="discount_amount" type="number" min="0"></label>
      <label>Minimal Belanja<input id="minimum_purchase" type="number" min="0"></label>
      <label>Batas Waktu Voucher<input id="expiry_datetime" type="datetime-local"></label>
      <label>Awalan Kode Voucher<input id="code_prefix" type="text" placeholder="AYANA"></label>
      <label class="full">Syarat & Ketentuan<textarea id="terms" rows="3"></textarea></label>
      <button id="loadBtn" class="secondary">Muat Data Admin</button>
      <button id="saveBtn">Simpan Pengaturan</button>
      <button id="resetBtn" class="secondary">Reset Daftar Klaim</button>
    </div>

    <h2>Daftar Klaim Voucher</h2>
    <table>
      <thead><tr><th>No</th><th>Kode</th><th>Nama</th><th>WhatsApp</th><th>Waktu Klaim</th></tr></thead>
      <tbody id="rows"><tr><td colspan="5">Masukkan PIN lalu klik Muat Data Admin.</td></tr></tbody>
    </table>
  </main>
  <script>
    const ids = ['promo_name','voucher_limit','discount_amount','minimum_purchase','expiry_datetime','terms','code_prefix'];
    const pinEl = document.getElementById('pin');
    const warning = document.getElementById('warning');
    function pin(){ return pinEl.value.trim(); }
    function showWarning(text){ warning.style.display='block'; warning.innerHTML=text; }
    if (location.protocol === 'file:') {
      showWarning('Admin tidak bisa dibuka langsung dari file. Jalankan server dulu, lalu buka <b>http://localhost:3000/admin</b>.');
    }
    async function api(url, options={}){
      options.headers = { 'Content-Type':'application/json', 'x-admin-pin': pin(), ...(options.headers||{}) };
      try {
        const res = await fetch(url, options);
        let data = {};
        try { data = await res.json(); } catch (_) {}
        if(!res.ok) throw new Error(data.error || 'Gagal memuat data dari server');
        return data;
      } catch (err) {
        if (location.protocol === 'file:') {
          throw new Error('Failed to fetch karena admin dibuka dari file HTML langsung. Buka lewat http://localhost:3000/admin setelah server dijalankan.');
        }
        throw new Error('Failed to fetch. Pastikan server Node.js sedang jalan dan buka alamat /admin dari domain/server yang sama.');
      }
    }
    async function loadAdmin(){
      const s = await api('/api/admin/settings');
      ids.forEach(id => document.getElementById(id).value = s[id] || '');
      const rows = await api('/api/admin/claims');
      document.getElementById('rows').innerHTML = rows.length ? rows.map((x,i)=>`<tr><td>${i+1}</td><td>${x.code}</td><td>${x.name||'-'}</td><td>${x.phone||'-'}</td><td>${x.created_at}</td></tr>`).join('') : '<tr><td colspan="5">Belum ada klaim.</td></tr>';
    }
    document.getElementById('loadBtn').onclick = () => loadAdmin().catch(e => alert(e.message));
    document.getElementById('saveBtn').onclick = async () => {
      const body = { pin: pin() };
      ids.forEach(id => body[id] = document.getElementById(id).value);
      try {
        await api('/api/admin/settings', { method:'POST', body: JSON.stringify(body) });
        alert('Pengaturan berhasil disimpan.');
        loadAdmin().catch(()=>{});
      } catch(e) { alert(e.message); }
    };
    document.getElementById('resetBtn').onclick = async () => {
      if(!confirm('Yakin reset semua klaim? Kode voucher akan mulai dari awal lagi.')) return;
      try {
        await api('/api/admin/reset-claims', { method:'POST', body: JSON.stringify({ pin: pin() }) });
        alert('Daftar klaim berhasil direset.');
        loadAdmin().catch(()=>{});
      } catch(e) { alert(e.message); }
    };
  </script>
</body>
</html>
