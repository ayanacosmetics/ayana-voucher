<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher Member Ayana Cosmetics</title>
<meta name="description" content="Klaim voucher khusus member Ayana Cosmetics.">
<meta property="og:title" content="Voucher Member Ayana Cosmetics">
<meta property="og:description" content="Klaim voucher khusus member Ayana Cosmetics. Kuota terbatas.">

<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#ffddea,#fff7fa);min-height:100vh;color:#5b1830}
.page{max-width:430px;margin:auto;padding:24px 18px}
.card{background:white;border-radius:34px;padding:28px 20px;text-align:center;box-shadow:0 16px 35px rgba(214,51,108,.22);border:1px solid #ffd1df}
.logo{width:150px;max-width:70%;display:block;margin:0 auto 14px;object-fit:contain}
.badge{display:inline-block;background:#ffe5ee;color:#d81b60;padding:8px 16px;border-radius:999px;font-weight:bold;font-size:13px}
h1{color:#d81b60;font-size:28px;margin:18px 0 8px}
.input,.select{width:100%;box-sizing:border-box;padding:15px;border-radius:18px;border:2px solid #f8bbd0;font-size:15px;text-align:center;margin-top:12px;background:white}
.btn{margin-top:16px;width:100%;border:none;border-radius:999px;padding:16px;font-size:16px;font-weight:bold;color:white;background:linear-gradient(90deg,#ec407a,#d81b60);cursor:pointer}
.btn:disabled{opacity:.7}
.ticket{margin-top:20px;background:linear-gradient(180deg,#ff6fa3,#ff9fbd);border-radius:24px;padding:18px;color:white}
.code{background:white;color:#d81b60;font-size:30px;font-weight:900;letter-spacing:1px;border-radius:18px;padding:16px 8px;border:2px dashed #ff7aa9;margin:14px 0}
.qrbox{background:white;border-radius:18px;padding:12px;margin:14px auto 0;width:180px}
.qrbox img{width:170px;height:170px;display:block;margin:auto}
.qrtext{font-size:13px;margin-top:8px;color:white}
.info{background:#fff7fa;color:#5b1830;border-radius:18px;padding:14px;text-align:left;line-height:1.9;margin-top:14px}
.tips{background:#fff0f6;border-radius:18px;padding:14px;margin-top:16px;font-size:14px}
.small{font-size:14px;color:#8a4b5f;line-height:1.6}
.hidden{display:none}

.voucher-counter{margin-top:12px;background:#fff5f8;padding:12px;border-radius:15px;font-weight:bold;color:#d81b60}
.voucher-counter-title{font-size:14px;font-weight:bold}
.voucher-counter-number{font-size:24px;font-weight:900;margin-top:4px}
.progress-wrap{width:100%;height:12px;background:#ffd4e3;border-radius:999px;margin-top:10px;overflow:hidden}
.progress-bar{height:100%;background:#d81b60;border-radius:999px;transition:.4s}
</style>
</head>

<body>
<div class="page">

<div class="card" id="start">
<img class="logo" src="/logo-ayana-baru.png" alt="Ayana Cosmetics">

<div class="badge">💖 EXCLUSIVE MEMBER ONLY</div>

<div class="voucher-counter" id="sisaVoucher">
  <div class="voucher-counter-title">🎁 Sisa Voucher Hari Ini</div>
  <div class="voucher-counter-number">Memuat...</div>
  <div class="progress-wrap">
    <div class="progress-bar" style="width:0%"></div>
  </div>
</div>

<h1>Voucher Khusus Member Ayana Cosmetics</h1>
<p class="small">Masukkan nomor WhatsApp yang terdaftar sebagai member untuk mendapatkan voucher spesial.</p>

<select class="select" id="kodePromo">
  <option value="">Memuat promo...</option>
</select>

<input class="input" id="phone" placeholder="Masukkan nomor WA member, contoh: 62812...">

<button class="btn" id="claimBtn" onclick="klaim()">🎁 KLAIM VOUCHER SEKARANG ✨</button>

<p class="small">Nomor akan dicek dengan data Member Ayana Cosmetics.</p>
</div>

<div class="card hidden" id="result"></div>

</div>

<script>
function formatRupiah(n){
  return "Rp"+Number(n||0).toLocaleString("id-ID");
}

async function loadStats(){
  try{
    const r = await fetch("/api/stats");
    const d = await r.json();

    if(!d.ok) return;

    const persen = d.total > 0 ? (d.tersedia / d.total) * 100 : 0;

    document.getElementById("sisaVoucher").innerHTML =
      `<div class="voucher-counter-title">🎁 Sisa Voucher Hari Ini</div>
       <div class="voucher-counter-number">${d.tersedia} / ${d.total}</div>
       <div class="progress-wrap">
         <div class="progress-bar" style="width:${persen}%"></div>
       </div>`;

  }catch(e){}
}

async function loadPromos(){
  const s=document.getElementById("kodePromo");

  try{
    const r=await fetch("/api/promos");
    const d=await r.json();

    if(!d.ok) throw new Error();

    if(!d.promos || d.promos.length===0){
      s.innerHTML='<option value="">Belum ada promo aktif</option>';
      return;
    }

    s.innerHTML='<option value="">Pilih promo voucher</option>'+
      d.promos.map(p=>`<option value="${p.kodePromo}">${p.namaPromo}</option>`).join("");

  }catch(e){
    s.innerHTML='<option value="">Gagal memuat promo</option>';
  }
}

async function klaim(){
  const phone=document.getElementById("phone").value;
  const kodePromo=document.getElementById("kodePromo").value;
  const btn=document.getElementById("claimBtn");

  btn.innerText="🎁 Membuka hadiah...";
  btn.disabled=true;

  try{
    const r=await fetch("/api/claim",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({phone,kodePromo})
    });

    const data = await r.json();

    if(data.status==="success"){
      btn.innerText="✨ Menyiapkan Ayana Beauty Surprise...";

      setTimeout(function(){
        showResult(data);
      }, 2000);
    }else{
      showResult(data);
    }

  }catch(e){
    showResult({
      ok:false,
      status:"error",
      message:"Terjadi error. Silakan coba lagi."
    });
  }
}

function showResult(res){
  document.getElementById("start").classList.add("hidden");

  const result=document.getElementById("result");
  result.classList.remove("hidden");

  if(res.status==="success"){
    const hadiah=formatRupiah(res.hadiahVoucher || res.diskon);
    const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(res.kodeVoucher)}`;

    result.innerHTML=
    `<img src="/logo-ayana-baru.png" alt="Ayana Cosmetics" style="width:120px;max-width:70%;display:block;margin:0 auto 14px;object-fit:contain;">
    <h1>🎁 Ayana Beauty Surprise</h1>
    <p>Selamat, ${res.nama}! Kamu mendapatkan voucher kejutan.</p>

    <div class="ticket">
      <div style="font-size:15px;font-weight:bold;">🎉 HADIAH VOUCHER KAMU</div>
      <div class="code">${hadiah}</div>

      <div style="font-size:13px;margin-top:8px;">Kode Voucher:</div>
      <div style="font-size:24px;font-weight:900;letter-spacing:1px;margin-top:4px;">${res.kodeVoucher}</div>

      <div class="qrbox">
        <img src="${qrUrl}" alt="QR Code Voucher">
      </div>
      <div class="qrtext">Tunjukkan QR Code Voucher ini ke kasir</div>
    </div>

    <div class="info">
      Nama Promo: <b>${res.namaPromo}</b><br>
      Nomor WA: <b>${res.phone}</b><br>
      🛍️ Minimal belanja: <b>${formatRupiah(res.minimal)}</b><br>
      📅 Periode: <b>${res.mulai} - ${res.berakhir}</b>
    </div>

    <div class="tips">💕 Jangan lupa screenshot voucher ini sebelum ditutup, lalu tunjukkan kepada kasir saat berbelanja di Ayana Cosmetics.</div>`;

  }else{
    result.innerHTML=
    `<img src="/logo-ayana-baru.png" alt="Ayana Cosmetics" style="width:150px;max-width:70%;display:block;margin:0 auto 14px;">
    <h1>😔 Maaf</h1>
    <p>${res.message || "Voucher belum bisa diklaim."}</p>
    <div class="tips">Voucher ini khusus untuk Member Ayana Cosmetics.</div>`;
  }
}

async function catatKunjungan(){
  try{
    await fetch("/api/visit", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        halaman: "voucher",
        browser: navigator.userAgent
      })
    });
  }catch(e){}
}

catatKunjungan();
loadPromos();
loadStats();
</script>

</body>
</html>
